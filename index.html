<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢検1級 分野別勉強</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="title">漢検1級 分野別勉強</p>

    <mark>(一)　音読み</mark><br>
    <br>
      <div id="linkContainer11"></div>
    <br>
    <mark>(一)　訓読み</mark><br>
    <br>
      <div id="linkContainer12"></div>
    <br>
    <mark>(三)　語選択</mark><br>
    <br>
      <div id="linkContainer3"></div>
    <br>
    <mark>(五)　熟字訓・当て字</mark><br>
    <br>
      <div id="linkContainer5"></div>
    <br>

    <script>
      const sels = [
        "甲子","乙丑","丙寅","丁卯","戊辰","己巳","庚午","辛未","壬申","癸酉",
        "甲戌","乙亥","丙子","丁丑","戊寅","己卯","庚辰","辛巳","壬午","癸未",
        "甲申","乙酉","丙戌","丁亥","戊子","己丑","庚寅","辛卯","壬辰","癸巳",
        "甲午","乙未","丙申","丁酉","戊戌","己亥","庚子","辛丑","壬寅","癸卯",
        "甲辰","乙巳","丙午","丁未","戊申","己酉","庚戌","辛亥","壬子","癸丑",
        "甲寅","乙卯","丙辰","丁巳","戊午","己未","庚申","辛酉","壬戌","癸亥",
      ];

      // 音読み
      const container11 = document.getElementById('linkContainer11');
      const maxIndex11 = Math.ceil(4200 / (24 * 20));
      for (const [index, title] of sels.entries()) {
        const link = document.createElement('a');
        link.href = `select.html?cat=0&sel=${index}`;
        link.textContent = title;
    
        container11.appendChild(link);
        container11.append('　'); // 全角スペース
    
        // 6個ごとに改行
        if ((index + 1) % 6 === 0) {
          container11.appendChild(document.createElement('br'));
          container11.appendChild(document.createElement('br'));
        }

        if (index === maxIndex11) {
          break;
        }
      }

      // 訓読み
      const container12 = document.getElementById('linkContainer12');
      const maxIndex12 = Math.ceil(410 / (24 * 10));
      for (const [index, title] of sels.entries()) {
        const link = document.createElement('a');
        link.href = `select.html?cat=1&sel=${index}`;
        link.textContent = title;
    
        container12.appendChild(link);
        container12.append('　'); // 全角スペース
    
        // 6個ごとに改行
        if ((index + 1) % 6 === 0) {
          container12.appendChild(document.createElement('br'));
          container12.appendChild(document.createElement('br'));
        }

        if (index === maxIndex12) {
          break;
        }
      }
      
      // 語選択
      const container3 = document.getElementById('linkContainer3');
      const maxIndex3 = Math.ceil(3786 / (24 * 5));
      for (const [index, title] of sels.entries()) {
        const link = document.createElement('a');
        link.href = `select.html?cat=4&sel=${index}`;
        link.textContent = title;
    
        container3.appendChild(link);
        container3.append('　'); // 全角スペース
    
        // 6個ごとに改行
        if ((index + 1) % 6 === 0) {
          container3.appendChild(document.createElement('br'));
          container3.appendChild(document.createElement('br'));
        }

        if (index === maxIndex3) {
          break;
        }
      }

      // 熟字訓
      const container5 = document.getElementById('linkContainer5');
      const maxIndex5 = Math.ceil(459 / (24 * 10));
      for (const [index, title] of sels.entries()) {
        const link = document.createElement('a');
        link.href = `select.html?cat=7&sel=${index}`;
        link.textContent = title;
    
        container5.appendChild(link);
        container5.append('　'); // 全角スペース
    
        // 6個ごとに改行
        if ((index + 1) % 6 === 0) {
          container5.appendChild(document.createElement('br'));
          container5.appendChild(document.createElement('br'));
        }

        if (index === maxIndex5) {
          break;
        }
      }
    </script>
  </body>
</html>
