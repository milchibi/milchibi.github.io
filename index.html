<!DOCTYPE html>

    <p class="title">音読み（甲子/立春）</p>
    <table border="1">

        </tr>
        <tr>

          <td id="txt3q"></td>
          <td><button id="btn3" type="button">解答</button></td>
          <td><div id="txt3" class="hidden"></div></td>

        </tr>
        <tr>
          <td><button id="btn4q" type="button">例文</button></td>
          <td id="txt4q"></td>
          <td><button id="btn4" type="button">解答</button></td>
          <td><div id="txt4" class="hidden"></div></td>
          <td><div id="txt4i" class="hidden"></div></td>
        </tr>
        <tr>
          <td><button id="btn5q" type="button">例文</button></td>
          <td id="txt5q"></td>
          <td><button id="btn5" type="button">解答</button></td>
          <td><div id="txt5" class="hidden"></div></td>
          <td><div id="txt5i" class="hidden"></div></td>
        </tr>
        <tr>
          <td><button id="btn6q" type="button">例文</button></td>
          <td id="txt6q"></td>
          <td><button id="btn6" type="button">解答</button></td>
          <td><div id="txt6" class="hidden"></div></td>
          <td><div id="txt6i" class="hidden"></div></td>
        </tr>
        <tr>
          <td><button id="btn7q" type="button">例文</button></td>
          <td id="txt7q"></td>
          <td><button id="btn7" type="button">解答</button></td>
          <td><div id="txt7" class="hidden"></div></td>
          <td><div id="txt7i" class="hidden"></div></td>
        </tr>
        <tr>
          <td><button id="btn8q" type="button">例文</button></td>
          <td id="txt8q"></td>
          <td><button id="btn8" type="button">解答</button></td>
          <td><div id="txt8" class="hidden"></div></td>
          <td><div id="txt8i" class="hidden"></div></td>
        </tr>
        <tr>
          <td><button id="btn9q" type="button">例文</button></td>
          <td id="txt9q"></td>
          <td><button id="btn9" type="button">解答</button></td>
          <td><div id="txt9" class="hidden"></div></td>
          <td><div id="txt9i" class="hidden"></div></td>
        </tr>
        <tr>
          <td><button id="btn10q" type="button">例文</button></td>
          <td id="txt10q"></td>
          <td><button id="btn10" type="button">解答</button></td>
          <td><div id="txt10" class="hidden"></div></td>
          <td><div id="txt10i" class="hidden"></div></td>
        </tr>
      </tbody>
    </table>

    <script>
      const btn = {};
      const btnQ = {};
      const txt = {};
      const txtq = {};
      const txti = {};
      let toggle1 = false;
      let toggle2 = false;
      let toggle3 = false;
      let toggle4 = false;
      let toggle5 = false;
      let toggle6 = false;
      let toggle7 = false;
      let toggle8 = false;
      let toggle9 = false;
      let toggle10 = false;

      const texts = [
        { on: '刺すような<u><strong>疼痛</strong></u>を感じる。', off: '<strong>疼痛</strong>', ans: 'とうつう', info: 'うずくように痛むこと。また、その痛み。' },
        { on: '彼奴の酔狂には<u><strong>之繞</strong></u>が掛かっている。', off: '<strong>之繞</strong>', ans: 'しんにょう', info: '之繞を掛ける＝程度をはなはだしくする。' },
        { on: '<u><strong>穹窿</strong></u>に雲雀の囀りが響く。', off: '<strong>穹窿</strong>', ans: 'きゅうりゅう', info: '大空。天空。' },
        { on: '<u><strong>焙烙</strong></u>で豆を炒る。', off: '<strong>焙烙</strong>', ans: 'ほうろく', info: '素焼きの平たい土鍋。' },
        { on: '<u><strong>石決明</strong></u>', off: '<strong>石決明</strong>', ans: 'あわび', info: 'ミミガイ科の巻貝の総称。<ruby>鮑<rt>あわび</rt></ruby>' },
        { on: '<u><strong>石決明</strong></u>', off: '<strong>石決明</strong>', ans: 'あわび', info: 'ミミガイ科の巻貝の総称。<ruby>鮑<rt>あわび</rt></ruby>' },
        { on: '<u><strong>石決明</strong></u>', off: '<strong>石決明</strong>', ans: 'あわび', info: 'ミミガイ科の巻貝の総称。<ruby>鮑<rt>あわび</rt></ruby>' },
        { on: '<u><strong>石決明</strong></u>', off: '<strong>石決明</strong>', ans: 'あわび', info: 'ミミガイ科の巻貝の総称。<ruby>鮑<rt>あわび</rt></ruby>' },
        { on: '<u><strong>石決明</strong></u>', off: '<strong>石決明</strong>', ans: 'あわび', info: 'ミミガイ科の巻貝の総称。<ruby>鮑<rt>あわび</rt></ruby>' },
        { on: '<u><strong>石決明</strong></u>', off: '<strong>石決明</strong>', ans: 'あわび', info: 'ミミガイ科の巻貝の総称。<ruby>鮑<rt>あわび</rt></ruby>' }
      ];

      for (let iLoop = 1; iLoop <= 10; iLoop++) {
        btn[`btn${iLoop}`] = document.getElementById(`btn${iLoop}`);
        btnQ[`btn${iLoop}q`] = document.getElementById(`btn${iLoop}q`);
        txt[`txt${iLoop}`] = document.getElementById(`txt${iLoop}`);
        txt[`txt${iLoop}q`] = document.getElementById(`txt${iLoop}q`);
        txt[`txt${iLoop}i`] = document.getElementById(`txt${iLoop}i`);
      }

      function toggleText(button, textElement, toggleState, textOn, textOff) {
        button.addEventListener('click', () => {
          toggleState = !toggleState;
          textElement.innerHTML = toggleState ? textOn : textOff;
        });
      }

      function toggleDisplay(button, textElement, textElement2) {
        button.addEventListener('click', () => {
          const isHidden = textElement.style.display === 'none' || textElement.style.display === '';
          textElement.style.display = isHidden ? 'block' : 'none';
          textElement2.style.display = isHidden ? 'block' : 'none';
        });
      }

      // 起動時に初期値を設定
      texts.forEach((text, index) => {
        document.getElementById(`txt${index + 1}q`).innerHTML = text.off;
        document.getElementById(`txt${index + 1}`).innerHTML = text.ans;
        document.getElementById(`txt${index + 1}i`).innerHTML = text.info;
      });

      toggleText(btn1q, txt1q, toggle1, texts[0].on, texts[0].off);
      toggleText(btn2q, txt2q, toggle2, texts[1].on, texts[1].off);
      toggleText(btn3q, txt3q, toggle3, texts[2].on, texts[2].off);
      toggleText(btn4q, txt4q, toggle4, texts[3].on, texts[3].off);
      toggleText(btn5q, txt5q, toggle5, texts[4].on, texts[4].off);
      toggleText(btn6q, txt6q, toggle6, texts[5].on, texts[5].off);
      toggleText(btn7q, txt7q, toggle7, texts[6].on, texts[6].off);
      toggleText(btn8q, txt8q, toggle8, texts[7].on, texts[7].off);
      toggleText(btn9q, txt9q, toggle9, texts[8].on, texts[8].off);
      toggleText(btn10q, txt10q, toggle10, texts[9].on, texts[9].off);

      toggleDisplay(btn1, txt1, txt1i);
      toggleDisplay(btn2, txt2, txt2i);
      toggleDisplay(btn3, txt3, txt3i);
      toggleDisplay(btn4, txt4, txt4i);
      toggleDisplay(btn5, txt5, txt5i);
      toggleDisplay(btn6, txt6, txt6i);
      toggleDisplay(btn7, txt7, txt7i);
      toggleDisplay(btn8, txt8, txt8i);
      toggleDisplay(btn9, txt9, txt9i);
      toggleDisplay(btn10, txt10, txt10i);
    </script>
  </body>
</html>
