    <script>
      const btn = {};
      const btnQ = {};
      const txt = {};
      const txtq = {};
      const txti = {};
      for (let iLoop = 1; iLoop <= 10; iLoop++) {
        btn[`btn${iLoop}`] = document.getElementById(`btn${iLoop}`);
        btnQ[`btn${iLoop}q`] = document.getElementById(`btn${iLoop}q`);
        txt[`txt${iLoop}`] = document.getElementById(`txt${iLoop}`);
        txt[`txt${iLoop}q`] = document.getElementById(`txt${iLoop}q`);
        txt[`txt${iLoop}i`] = document.getElementById(`txt${iLoop}i`);
      }

      function toggleText(button, textElement, toggleState, textOn, textOff) {
        button.addEventListener('click', () => {
          toggleState = !toggleState;
          textElement.innerHTML = toggleState ? textOn : textOff;
        });
      }

      function toggleDisplay(button, textElement, textElement2) {
        button.addEventListener('click', () => {
          const isHidden = textElement.style.display === 'none' || textElement.style.display === '';
          textElement.style.display = isHidden ? 'block' : 'none';
          textElement2.style.display = isHidden ? 'block' : 'none';
        });
      }
      
      let toggle1 = false;
      let toggle2 = false;
      let toggle3 = false;
      let toggle4 = false;
      let toggle5 = false;
      let toggle6 = false;
      let toggle7 = false;
      let toggle8 = false;
      let toggle9 = false;
      let toggle10 = false;
      
      toggleText(btn1q, txt1q, toggle1, '刺すような<u><strong>疼痛</strong></u>を感じる。', '<strong>疼痛</strong>');
      toggleText(btn2q, txt2q, toggle2, '彼奴の酔狂には<u><strong>之繞</strong></u>が掛かっている。', '<strong>之繞</strong>');
      toggleText(btn3q, txt3q, toggle3, '<u><strong>穹窿</strong></u>に雲雀の囀りが響く。', '<strong>穹窿</strong>');
      toggleText(btn4q, txt4q, toggle4, '<u><strong>焙烙</strong></u>で豆を炒る。', '<strong>焙烙</strong>');
      toggleText(btn5q, txt5q, toggle5, 'block', 'none');
      toggleText(btn6q, txt6q, toggle6, 'block', 'none');
      toggleText(btn7q, txt7q, toggle7, 'block', 'none');
      toggleText(btn8q, txt8q, toggle8, 'block', 'none');
      toggleText(btn9q, txt9q, toggle9, 'block', 'none');
      toggleText(btn10q, txt10q, toggle10, 'block', 'none');

      toggleDisplay(btn1, txt1, txt1i);
      toggleDisplay(btn2, txt2, txt2i);
      toggleDisplay(btn3, txt3, txt3i);
      toggleDisplay(btn4, txt4, txt4i);
      toggleDisplay(btn5, txt5, txt5i);
      toggleDisplay(btn6, txt6, txt6i);
      toggleDisplay(btn7, txt7, txt7i);
      toggleDisplay(btn8, txt8, txt8i);
      toggleDisplay(btn9, txt9, txt9i);
      toggleDisplay(btn10, txt10, txt10i);
    </script>
