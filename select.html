<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <link rel="stylesheet" href="..\..\style.css">
  </head>
  <body>
    <h1>漢検1級勉強</h1>
    <h2 id="pageSubtitle"></h2>

    <div id="linkContainer"></div>
    
    <br><br>
    <a href="..\..\index.html">戻る</a>
    
    <script>
      const params = new URLSearchParams(location.search);
      const cat = parseInt(params.get('cat')) || 0;
      const sel = parseInt(params.get('sel')) || 0;
      const cats = [
        "音読み","訓読み","書き取り","書き取り-国字","語選択","四字熟語-書き","四字熟語-意味","熟字訓","熟語-一字訓読み","対義語・類義語","故事成語","文章題"
      ];
      const sels = [
        "甲","乙","丙","丁","戊","己","庚","辛","壬","癸"
      ];
      const titles = [
        "立春","雨水","啓蟄","春分","清明","穀雨",
        "立夏","小満","芒種","夏至","小暑","大暑",
        "立秋","処暑","白露","秋分","寒露","霜降",
        "立冬","小雪","大雪","冬至","小寒","大寒"
      ];

      // タイトル反映
      const titleText = `漢検1級勉強　${cats[cat]}【${sels[sel]}】`;
      document.getElementById('pageTitle').textContent = titleText;
      document.getElementById('pageSubtitle').textContent = `${cats[cat]}【${sels[sel]}】`;
    
      const container = document.getElementById('linkContainer');
    
      titles.forEach((title, index) => {
        const link = document.createElement('a');
        link.href = `quiz.html?cat=${cat}&sel=${sel}&page=${index}`;
        link.textContent = title;
    
        container.appendChild(link);
        container.append('　'); // 全角スペース
    
        // 6個ごとに改行
        if ((index + 1) % 6 === 0) {
          container.appendChild(document.createElement('br'));
          container.appendChild(document.createElement('br'));
        }
      });
    </script>
  </body>
</html>
