<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <link rel="stylesheet" href="../../style.css">
  </head>
  <body>
    <h1>漢検1級勉強</h1>
    <h2 id="pageSubtitle"></h2>
    <table border="1">
      <tbody id="quizTable"></tbody>
    </table>
    <br>
    <div id="container"></div>
    <br>
    <a id="prevLink" href="">前へ</a>　　<a id="backLink" href="">戻る</a>　　<a id="nextLink" href="">次へ</a>
  
    <script>
      const params = new URLSearchParams(location.search);
      const cat = parseInt(params.get('cat')) || 0;
      const sel = parseInt(params.get('sel')) || 0;
      const page = parseInt(params.get('page')) || 0;
      const seed = parseInt(params.get('seed')) || 0;
      const cats = [
        "音読み","訓読み","書き取り","書き取り-国字","語選択","四字熟語-書き","四字熟語-意味","熟字訓","熟語-一字訓読み","対義語・類義語","故事成語","文章題"
      ];
      const sels = [
        "甲子","乙丑","丙寅","丁卯","戊辰","己巳","庚午","辛未","壬申","癸酉",
        "甲戌","乙亥","丙子","丁丑","戊寅","己卯","庚辰","辛巳","壬午","癸未",
        "甲申","乙酉","丙戌","丁亥","戊子","己丑","庚寅","辛卯","壬辰","癸巳",
        "甲午","乙未","丙申","丁酉","戊戌","己亥","庚子","辛丑","壬寅","癸卯",
        "甲辰","乙巳","丙午","丁未","戊申","己酉","庚戌","辛亥","壬子","癸丑",
        "甲寅","乙卯","丙辰","丁巳","戊午","己未","庚申","辛酉","壬戌","癸亥",
      ];
      const titles = [
        "立春","雨水","啓蟄","春分","清明","穀雨",
        "立夏","小満","芒種","夏至","小暑","大暑",
        "立秋","処暑","白露","秋分","寒露","霜降",
        "立冬","小雪","大雪","冬至","小寒","大寒"
      ];
      
      let num = 0;
      let max = 0;
      let filename = "";

      // 音読み
      if (cat == 0) {
        num = 20;
        max = 4200;
        filename = 'https://milchibi.github.io/data_11.csv';
      }
      // 訓読み
      else if (cat == 1) {
        num = 10;
        max = 1400;
        filename = 'https://milchibi.github.io/data_12.csv';
      }
      // 語選択
      else if (cat == 4) {
        num = 5;
        max = 3786;
        filename = 'https://milchibi.github.io/data_3.csv';
        const container = document.getElementById("container");
      
        // spanを8個生成
        const items = Array.from({ length: 8 }, (_, i) =>
          `<span id="sel${i}" class="item"></span>`
        );
      
        // 「・」で連結して [] で囲む
        container.innerHTML = `[${items.join("・")}]`;
      }
      // 熟字訓
      else if (cat == 7) {
        num = 10;
        max = 2182;
        filename = 'https://milchibi.github.io/data_5.csv';
      }

      const startIndex = (sel * 24 * num) + (page * num);
      const shuffledIndex = Array.from({ length: max }, (_, i) => i);

      if (seed != 0) {
        const random = mulberry32(seed);
        for (let i = shuffledIndex.length - 1; i > 0; i--) {
          const j = Math.floor(random() * (i + 1));
          [shuffledIndex[i], shuffledIndex[j]] = [shuffledIndex[j], shuffledIndex[i]];
        }
      }
      
      // タイトル反映
      const titleText = `漢検1級勉強　${cats[cat] || ''}【${sels[sel] || ''}-${titles[page] || ''}】`;
      document.getElementById('pageTitle').textContent = titleText;
      document.getElementById('pageSubtitle').textContent = `${cats[cat] || ''}【${sels[sel] || ''}-${titles[page] || ''}】`;
    
      const tbody = document.getElementById('quizTable');
      let arr = new Array(8);

      // 問題数分回す
      for (let i = 1; i <= num; i++) {
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td width="52">問${i}</td>
            <td id="txt${i}q" class="ques"></td>
          </tr>
          <tr>
            <td class="ans">
              <button class="toggleBtn" data-id="${i}">解答</button>
            </td>
            <td class="ans">
              <div id="txt${i}" class="hidden"></div>
            </td>
          </tr>
        `);
      }
    
      fetch(filename)
        .then(res => res.text())
        .then(csv => {
          const data = csv.split('\n').map(line => line.split(','));
    
          for (let i = 0; i < num; i++) {
            const row = data[shuffledIndex[startIndex + i]];
            if (!row) continue;
    
            document.getElementById(`txt${i+1}q`).innerHTML = row[3];
            if (cat != 4) {
              document.getElementById(`txt${i+1}`).innerHTML = row[4] + '<br><hr>' + row[5];
            }
            else {
              document.getElementById(`txt${i+1}`).innerHTML = row[5];
              arr[i] = row[4];
            }
          }
          if (cat == 4) {
            arr[5] = data[data[shuffledIndex[startIndex + 0]][6]][4];
            arr[6] = data[data[shuffledIndex[startIndex + 1]][6]][4];
            arr[7] = data[data[shuffledIndex[startIndex + 2]][6]][4];
            arr.sort((a, b) => a.localeCompare(b, 'ja', { sensitivity: 'base' }));
            arr.forEach((value, i) => {
              const el = document.getElementById(`sel${i}`);
              if (el) el.textContent = value;
            });
    
            document.querySelectorAll(".item").forEach(el => {
              el.addEventListener("click", () => {
                el.classList.toggle("strike");
              });
            });
          }
        });
    
      // イベント委譲で高速化＆簡素化
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('toggleBtn')) {
          const id = e.target.dataset.id;
          const answer = document.getElementById(`txt${id}`);
      
          if (!answer) return;
      
          answer.style.display =
            answer.style.display === 'block' ? 'none' : 'block';
        }
      });

      // 戻るリンク
      document.getElementById("backLink").href = `select.html?cat=${cat}&sel=${sel}`;

      // 前へリンク
      if (sel == 0 && page == 0) {
        // 先頭ページのため、前へリンクなし
      }
      else if (page == 0) {
        // 前の十干十二支の最後に戻る
        document.getElementById("prevLink").href = `quiz.html?cat=${cat}&sel=${sel-1}&page=23`;
      }
      else {
        // 前の二十四節気に戻る
        document.getElementById("prevLink").href = `quiz.html?cat=${cat}&sel=${sel}&page=${page-1}`;
      }

      // 次へリンク
      if (((sel * (24 * num)) + ((page + 1 + 1) * num)) > max) {
        // 最終ページのため、次へリンクなし
      }
      else if (page == 23) {
        // 次の十干十二支の先頭に進む
        document.getElementById("nextLink").href = `quiz.html?cat=${cat}&sel=${sel+1}&page=0`;
      }
      else {
        // 次の二十四節気に進む
        document.getElementById("nextLink").href = `quiz.html?cat=${cat}&sel=${sel}&page=${page+1}`;
      }

      function mulberry32(seed) {
        return function() {
          let t = seed += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }
      }
    </script>
  </body>
</html>
