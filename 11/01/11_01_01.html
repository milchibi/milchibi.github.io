    <script>
      const btn = {};
      const btnQ = {};
      const txt = {};
      const txtq = {};
      let toggle1 = false;
      let toggle2 = false;
      let toggle3 = false;
      let toggle4 = false;
      let toggle5 = false;
      let toggle6 = false;
      let toggle7 = false;
      let toggle8 = false;
      let toggle9 = false;

      let toggle11 = false;
      let toggle12 = false;
      let toggle13 = false;
      let toggle14 = false;
      let toggle15 = false;
      let toggle16 = false;
      let toggle17 = false;
      let toggle18 = false;
      let toggle19 = false;
      let toggle20 = false;

      const texts = [
        { on: '因習に<u><strong>羈束</strong></u>され不自由極まる。',                                   off: '<strong>羈束</strong>', ans: 'きそく<br>[意味]'       },
        { on: '先人の徳を<u><strong>聿修</strong></u>す。',                                             off: '<strong>聿修</strong>', ans: 'いっしゅう<br>[意味]'   },
        { on: '<u><strong>翕如</strong></u>たる好演奏を聞いた。',                                       off: '<strong>翕如</strong>', ans: 'きゅうじょ<br>[意味]'   },
        { on: '両手に<u><strong>腁胝</strong></u>生ず。',                                               off: '<strong>腁胝</strong>', ans: 'へんち<br>[意味]'       },
        { on: '<u><strong>聳懼</strong></u>の連続に見舞わる。',                                         off: '<strong>聳懼</strong>', ans: 'しょうく<br>[意味]'     },
        { on: '吉報を<u><strong>翹望</strong></u>す。',                                                 off: '<strong>翹望</strong>', ans: 'ぎょうぼう<br>[意味]'   },
        { on: '<u><strong>耿耿</strong></u>として暁まで眠れず。',                                       off: '<strong>耿耿</strong>', ans: 'こうこう<br>[意味]'     },
        { on: '累乗のことを<u><strong>羃</strong></u>という。',                                         off: '<strong>羃</strong>',   ans: 'べき<br>[意味]'         },
        { on: '大いに和し、<u><strong>耋艾</strong></u>歌詠す。',                                       off: '<strong>耋艾</strong>', ans: 'てつがい<br>[意味]'     },
        { on: '祖父は古<u><strong>書肆</strong></u>を営んだ。',                                         off: '<strong>書肆</strong>', ans: 'しょし<br>[意味]'       },
        { on: '夢は<u><strong>須臾</strong></u>にして消え去った。',                                     off: '<strong>須臾</strong>', ans: 'しゅゆ、すゆ<br>[意味]' },
        { on: '<u><strong>一臠</strong></u>の肉を嘗めて<ruby>一鑊<rt>イッカク</rt></ruby>の味を知る。', off: '<strong>一臠</strong>', ans: 'いちれん<br>[意味]'     },
        { on: '門を開いて盗を<u><strong>揖</strong></u>す。',                                           off: '<strong>揖</strong>',   ans: 'ゆう<br>[意味]'         },
        { on: '英奇を<u><strong>仄陋</strong></u>に采る。',                                             off: '<strong>仄陋</strong>', ans: 'そくろう<br>[意味]'     },
        { on: '<u><strong>羌</strong></u>は中国西部に住んだ異民族だ。',                                 off: '<strong>羌</strong>',   ans: 'きょう<br>[意味]'       },
        { on: '<u><strong>壎篪</strong></u>相和す。',                                                   off: '<strong>壎篪</strong>', ans: 'けんち<br>[意味]'       },
        { on: '<u><strong>愆過</strong></u>を直ちに改める。',                                           off: '<strong>愆過</strong>', ans: 'けんか<br>[意味]'       },

        { on: '<u><strong>讒言</strong></u>すべきものなし。',                                           off: '<strong>讒言</strong>', ans: 'ざんげん<br>[意味]'     },
        { on: '<u><strong>涓滴</strong></u>岩を穿つ。',                                                 off: '<strong>涓滴</strong>', ans: 'けんてき<br>[意味]'     }
      ];

      for (let iLoop = 1; iLoop <= 20; iLoop++) {
        btn[`btn${iLoop}`] = document.getElementById(`btn${iLoop}`);
        btnQ[`btn${iLoop}q`] = document.getElementById(`btn${iLoop}q`);
        txt[`txt${iLoop}`] = document.getElementById(`txt${iLoop}`);
        txt[`txt${iLoop}q`] = document.getElementById(`txt${iLoop}q`);
      }

      function toggleDisplay(button, textElement) {
        button.addEventListener('click', () => {
          const isHidden = textElement.style.display === 'none' || textElement.style.display === '';
          textElement.style.display = isHidden ? 'block' : 'none';
        });
      }

      // 起動時に初期値を設定
      texts.forEach((text, index) => {
        document.getElementById(`txt${index + 1}q`).innerHTML = text.on;
        document.getElementById(`txt${index + 1}`).innerHTML = text.ans;
      });

      toggleDisplay(btn1, txt1);
      toggleDisplay(btn2, txt2);
      toggleDisplay(btn3, txt3);
      toggleDisplay(btn4, txt4);
      toggleDisplay(btn5, txt5);
      toggleDisplay(btn6, txt6);

      toggleDisplay(btn13, txt13);
      toggleDisplay(btn14, txt14);
      toggleDisplay(btn15, txt15);
      toggleDisplay(btn16, txt16);
      toggleDisplay(btn17, txt17);
      toggleDisplay(btn18, txt18);
      toggleDisplay(btn19, txt19);
