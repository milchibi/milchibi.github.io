<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>жјўжӨң1зҙҡеӢүеј·гҖҖйҹіиӘӯгҒҝгҖҗз”І-з«Ӣз§ӢгҖ‘</title>
    <link rel="stylesheet" href="..\..\style.css">
  </head>
  <body>
    <h1>жјўжӨң1зҙҡеӢүеј·</h1>
    <h2>йҹіиӘӯгҒҝгҖҗз”І-з«Ӣз§ӢгҖ‘</h2>
    <table border="1">
      <tbody id="quizTable"></tbody>
    </table>
    <br>
    <a href="11_01.html">жҲ»гӮӢ</a>

    <script>
      const tbody = document.getElementById('quizTable');
      
      for (let i = 1; i <= 20; i++) {
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td width="52">е•Ҹ${i}</td>
            <td id="txt${i}q" class="ques"></td>
          </tr>
          <tr>
            <td class="ans">
              <button id="btn${i}" type="button">и§Јзӯ”</button>
            </td>
            <td class="ans">
              <div id="txt${i}" class="hidden"></div>
            </td>
          </tr>
        `);
      }
      
      fetch('https://milchibi.github.io/data_11.csv')
        .then(response => response.text())
        .then(csvText => {
          const lines = csvText.split('\n');
          const result = lines.map(line => line.split(','));
          for (let i = 0; i < 20; i++) {
            document.getElementById(`txt${i + 1}q`).innerHTML = result[i + 240][3];
            document.getElementById(`txt${i + 1}`).innerHTML = result[i + 240][4] + '<br><hr>' + result[i + 240][5];
          }
        });

      function toggleDisplay(button, textElement) {
        button.addEventListener('click', () => {
          const isHidden = textElement.style.display === 'none' || textElement.style.display === '';
          textElement.style.display = isHidden ? 'block' : 'none';
        });
      }

      for (let i = 1; i <= 20; i++) {
        const btn = document.getElementById(`btn${i}`);
        const txt = document.getElementById(`txt${i}`);
        toggleDisplay(btn, txt);
      }
    </script>
  </body>
</html>
