<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢検1級勉強　訓読み【甲-秋分】</title>
    <link rel="stylesheet" href="..\..\style.css">
  </head>
  <body>
    <h1>漢検1級勉強</h1>
    <h2>訓読み【甲-秋分】</h2>
    <table border="1">
      <tbody id="quizTable"></tbody>
    </table>
    <br>
    <a href="12_01.html">戻る</a>

    <script>
      const tbody = document.getElementById('quizTable');
      
      for (let i = 1; i <= 10; i++) {
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td width="52">問${i}</td>
            <td id="txt${i}q" class="ques"></td>
          </tr>
          <tr>
            <td class="ans">
              <button id="btn${i}" type="button">解答</button>
            </td>
            <td class="ans">
              <div id="txt${i}" class="hidden"></div>
            </td>
          </tr>
        `);
      }
      
      fetch('https://milchibi.github.io/data_12.csv')
        .then(response => response.text())
        .then(csvText => {
          const lines = csvText.split('\n');
          const result = lines.map(line => line.split(','));
          for (let i = 0; i < 10; i++) {
            document.getElementById(`txt${i + 1}q`).innerHTML = result[i + 150][3];
            document.getElementById(`txt${i + 1}`).innerHTML = result[i + 150][4] + '<br><hr>' + result[i + 150][5];
          }
        });

      function toggleDisplay(button, textElement) {
        button.addEventListener('click', () => {
          const isHidden = textElement.style.display === 'none' || textElement.style.display === '';
          textElement.style.display = isHidden ? 'block' : 'none';
        });
      }

      for (let i = 1; i <= 10; i++) {
        const btn = document.getElementById(`btn${i}`);
        const txt = document.getElementById(`txt${i}`);
        toggleDisplay(btn, txt);
      }
    </script>
  </body>
</html>
