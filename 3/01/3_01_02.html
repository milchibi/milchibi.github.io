<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢検1級勉強　語選択【甲-雨水】</title>
    <link rel="stylesheet" href="..\..\style.css">
  </head>
  <body>
    <h1>漢検1級勉強</h1>
    <h2>熟字訓・語選択【甲-雨水】</h2>
    <table border="1">
      <tbody id="quizTable"></tbody>
    </table>
    <br>
    [<span id="sel0" class="item"></span>・<span id="sel1" class="item"></span>・<span id="sel2" class="item"></span>・<span id="sel3" class="item"></span>・<span id="sel4" class="item"></span>・<span id="sel5" class="item"></span>・<span id="sel6" class="item"></span>・<span id="sel7" class="item"></span>]
    <br>
    <br>
    <a href="3_01.html">戻る</a>

    <script>
      const tbody = document.getElementById('quizTable');
      const offset = 5;
      let arr = new Array(8);
      
      for (let i = 1; i <= 5; i++) {
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td width="52">問${i}</td>
            <td id="txt${i}q" class="ques"></td>
          </tr>
          <tr>
            <td class="ans">
              <button id="btn${i}" type="button">解答</button>
            </td>
            <td class="ans">
              <div id="txt${i}" class="hidden"></div>
            </td>
          </tr>
        `);
      }
      
      fetch('https://milchibi.github.io/data_3.csv')
        .then(response => response.text())
        .then(csvText => {
          const lines = csvText.split('\n');
          const result = lines.map(line => line.split(','));
          for (let i = 0; i < 5; i++) {
            document.getElementById(`txt${i + 1}q`).innerHTML = result[i + offset][3];
            document.getElementById(`txt${i + 1}`).innerHTML = result[i + offset][5];
            arr[i] = result[i + offset][4];
          }
          arr[5] = result[offset + 39][4];
          arr[6] = result[offset + 53][4];
          arr[7] = result[offset + 68][4];
          arr.sort((a, b) => a.localeCompare(b, 'ja', { sensitivity: 'base' }));
          arr.forEach((value, i) => {
            const el = document.getElementById(`sel${i}`);
            if (el) el.textContent = value;
          });

          document.querySelectorAll(".item").forEach(el => {
            el.addEventListener("click", () => {
              el.classList.toggle("strike");
            });
          });
        });

      function toggleDisplay(button, textElement) {
        button.addEventListener('click', () => {
          const isHidden = textElement.style.display === 'none' || textElement.style.display === '';
          textElement.style.display = isHidden ? 'block' : 'none';
        });
      }

      for (let i = 1; i <= 5; i++) {
        const btn = document.getElementById(`btn${i}`);
        const txt = document.getElementById(`txt${i}`);
        toggleDisplay(btn, txt);
      }
    </script>
  </body>
</html>
