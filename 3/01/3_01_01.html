<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢検1級勉強　語選択【甲-立春】</title>
    <link rel="stylesheet" href="..\..\style.css">
  </head>
  <body>
    <h1>漢検1級勉強</h1>
    <h2>熟字訓・語選択【甲-立春】</h2>
    <table border="1">
      <tbody id="quizTable"></tbody>
    </table>
    <br>
    <div id="sel"></div>
    <br>
    <br>
    <a href="3_01.html">戻る</a>

    <script>
      const tbody = document.getElementById('quizTable');
      let arr = new Array(8);
      
      for (let i = 1; i <= 5; i++) {
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td width="52">問${i}</td>
            <td id="txt${i}q" class="ques"></td>
          </tr>
          <tr>
            <td class="ans">
              <button id="btn${i}" type="button">解答</button>
            </td>
            <td class="ans">
              <div id="txt${i}" class="hidden"></div>
            </td>
          </tr>
        `);
      }
      
      fetch('https://milchibi.github.io/data_3.csv')
        .then(response => response.text())
        .then(csvText => {
          const lines = csvText.split('\n');
          const result = lines.map(line => line.split(','));
          for (let i = 0; i < 5; i++) {
            document.getElementById(`txt${i + 1}q`).innerHTML = result[i][3];
            document.getElementById(`txt${i + 1}`).innerHTML = result[i][5];
            arr[i] = result[i][4];
          }
          arr[5] = result[39][4];
          arr[6] = result[53][4];
          arr[7] = result[68][4];
          arr.sort((a, b) => a.localeCompare(b, 'ja', { sensitivity: 'base' }));
          for (let i = 0; i < 8; i++) {
            document.getElementById(`txt${i + 1}q`).innerHTML = result[i][3];
            document.getElementById(`txt${i + 1}`).innerHTML = result[i][5];
            arr[i] = result[i][4];
          }
          document.getElementById(`sel`).innerHTML = arr[0] + '・' + arr[1] + '・' + arr[2] + '・' + arr[3] + '・' + arr[4] + '・' + arr[5] + '・' + arr[6] + '・' + arr[7];
        });

      function toggleDisplay(button, textElement) {
        button.addEventListener('click', () => {
          const isHidden = textElement.style.display === 'none' || textElement.style.display === '';
          textElement.style.display = isHidden ? 'block' : 'none';
        });
      }

      for (let i = 1; i <= 5; i++) {
        const btn = document.getElementById(`btn${i}`);
        const txt = document.getElementById(`txt${i}`);
        toggleDisplay(btn, txt);
      }
    </script>
  </body>
</html>
